server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.nginx-debian.html;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    root /var/www/html;
    index index.nginx-debian.html;
}
